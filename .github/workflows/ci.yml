name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    name: build & test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          install-mode: goinstall
