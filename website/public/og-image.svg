<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAF9F6"/>
  <g font-family="Satoshi, Helvetica Neue, Helvetica, Arial, sans-serif" fill="#0E0E10" font-weight="700">
    <text x="80" y="200" font-size="84" letter-spacing="-2.5">A Go framework for</text>
    <text x="80" y="290" font-size="84" letter-spacing="-2.5"><tspan fill="#1E3A8A">differentially private</tspan></text>
    <text x="80" y="380" font-size="84" letter-spacing="-2.5">graph algorithms.</text>
  </g>
  <g font-family="Satoshi, Helvetica Neue, Helvetica, Arial, sans-serif" fill="#595964">
    <text x="80" y="450" font-size="22">k-core decomposition · triangle counting · LEDP · CDP · RR</text>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#1E3A8A">
    <text x="80" y="540" font-size="20">go get github.com/WildAlg/dpgraph</text>
    <text x="80" y="570" font-size="20" fill="#595964">wildalg.github.io/dpgraph</text>
  </g>
  <g transform="translate(960, 280)">
    <circle cx="-90" cy="-90" r="9" fill="#0E0E10"/>
    <circle cx="90" cy="-90" r="9" fill="#0E0E10"/>
    <circle cx="-90" cy="90" r="9" fill="#0E0E10"/>
    <circle cx="90" cy="90" r="9" fill="#0E0E10"/>
    <circle cx="0" cy="0" r="11" fill="#1E3A8A"/>
    <line x1="-90" y1="-90" x2="0" y2="0" stroke="#0E0E10" stroke-width="2"/>
    <line x1="90" y1="-90" x2="0" y2="0" stroke="#0E0E10" stroke-width="2"/>
    <line x1="-90" y1="90" x2="0" y2="0" stroke="#0E0E10" stroke-width="2"/>
    <line x1="90" y1="90" x2="0" y2="0" stroke="#0E0E10" stroke-width="2"/>
    <line x1="-90" y1="-90" x2="-90" y2="90" stroke="#E25822" stroke-width="2" stroke-dasharray="4 5"/>
    <line x1="90" y1="-90" x2="90" y2="90" stroke="#E25822" stroke-width="2" stroke-dasharray="4 5"/>
  </g>
